name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  PUBLIC_STORYBLOK_SPACE_ID: 191005

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    continue-on-error: false
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm lint

  test:
    name: Test
    runs-on: ubuntu-24.04
    continue-on-error: false
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
